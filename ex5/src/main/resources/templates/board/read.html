<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/basic::setContent(~{this::content})}">
  <th:block th:fragment="content">
    <style>
        .form-group {margin: 30px 0 30px 0;}
    </style>
    <h1 class="mt-4">Board Read Page</h1>
    <form th:action="@{/board/register}" method="post">
      <div class="form-group">
        <label for="gno">Gno</label>
        <input type="text" name="gno" id="gno" class="form-control" th:value="${boardDTO.gno}" readonly />
      </div>
      <div class="form-group">
        <label for="title">Title</label>
        <input type="text" name="title" id="title" class="form-control" th:value="${boardDTO.title}" readonly/>
      </div>
      <div class="form-group">
        <label for="content">Content</label>
        <input type="text" name="content" id="content" class="form-control"
               th:value="${boardDTO.content}" readonly/>
      </div>
      <div class="form-group">
        <label for="writer">Writer</label>
        <input type="text" name="writer" id="writer" class="form-control"
               th:value="${boardDTO.writer}" readonly>
      </div>
      <div class="form-group">
        <label>Regist Date</label>
        <input type="text" class="form-control"
               th:value="${#temporals.format(boardDTO.regDate, 'yyyy/MM/dd hh:mm')}" readonly>
      </div>
      <div class="form-group">
        <label>Modified Date</label>
        <input type="text" class="form-control"
               th:value="${#temporals.format(boardDTO.modDate, 'yyyy/MM/dd hh:mm')}" readonly>
      </div>
      <div class="form-group">
        <a th:href="@{/board/modify(page=${pageRequestDTO.page},gno=${boardDTO.gno},type=${pageRequestDTO.type},keyword=${pageRequestDTO.keyword})}" class="btn btn-outline-primary">수정</a>
        <a th:href="@{/board/list(page=${pageRequestDTO.page},type=${pageRequestDTO.type},keyword=${pageRequestDTO.keyword})}" class="btn btn-outline-primary">리스트보기</a>
      </div>
      <div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              <!-- <button type="button"  class="btn btn-primary">Save changes</button> -->
            </div>
          </div>
        </div>
      </div>
      <script th:inline="javascript">
        window.onload = () => {
          let msg = /*[[${msg}]]*/'msg'
          if (msg) {
            const myModal = new bootstrap.Modal(document.querySelector('#myModal'),{backdrop:true});
            document.querySelector(".modal-title").innerHTML = '<p>알림</p>'
            document.querySelector(".modal-body").textContent = msg
            myModal.show();
            history.replaceState({}, null, null) //모달창 띄운 흔적을 history에서 제거
          }
        }

      </script>

    </form>
    <script th:inline="javascript">
      const btnRegister = document.querySelector(".btn-register")
      const title = document.querySelector("#title")
      const content = document.querySelector("#content")
      const writer = document.querySelector("#writer")
      btnRegister.onclick = e => {
        e.preventDefault()
        if (!title.value) {
          title.setAttribute('placeholder', "Title을 확인해주세요")
          title.focus();
          return;
        }
        if (!content.value) {
          content.setAttribute('placeholder', "content를 확인해주세요")
          content.focus();
          return;
        }
        if (!writer.value) {
          writer.setAttribute('placeholder', "Writer를 확인해주세요")
          writer.focus();
          return;
        }
        document.querySelector("form").submit();
      }
    </script>
  </th:block>
</th:block>
</html>
