# App name
spring.application.name=ex4

# Sever port
server.port=8080

# Context path
server.servlet.context-path=/ex4

# Spring Data Source
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/db7
spring.datasource.username=db7
spring.datasource.password=1234

