<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/basic::setContent(~{this::content})}">
  <th:block th:fragment="content">
    <style>
        .form-group {margin: 30px 0 30px 0;}
    </style>
    <h1 class="mt-4">Guestbook Read Page</h1>
    <form th:action="@{/guestbook/register}" method="post">
      <div class="form-group">
        <label for="gno">Gno</label>
        <input type="text" name="gno" id="gno" class="form-control" th:value="${guestbookDTO.gno}" readonly />
      </div>
      <div class="form-group">
        <label for="title">Title</label>
        <input type="text" name="title" id="title" class="form-control" th:value="${guestbookDTO.title}" />
      </div>
      <div class="form-group">
        <label for="content">Content</label>
        <input type="text" name="content" id="content" class="form-control"
               th:value="${guestbookDTO.content}" />
      </div>
      <div class="form-group">
        <label for="writer">Writer</label>
        <input type="text" name="writer" id="writer" class="form-control"
               th:value="${guestbookDTO.writer}" readonly>
      </div>
      <div class="form-group">
        <label>Regist Date</label>
        <input type="text" class="form-control"
               th:value="${#temporals.format(guestbookDTO.regDate, 'yyyy/MM/dd hh:mm')}" readonly>
      </div>
      <div class="form-group">
        <label>Modified Date</label>
        <input type="text" class="form-control"
               th:value="${#temporals.format(guestbookDTO.modDate, 'yyyy/MM/dd hh:mm')}" readonly>
      </div>
      <div class="form-group">
        <button type="submit" class="btn btn-primary btn-register">Submit</button>
      </div>
    </form>
    <script th:inline="javascript">
      const btnRegister = document.querySelector(".btn-register")
      const title = document.querySelector("#title")
      const content = document.querySelector("#content")
      const writer = document.querySelector("#writer")
      btnRegister.onclick = e => {
        e.preventDefault()
        if (!title.value) {
          title.setAttribute('placeholder', "Title을 확인해주세요")
          title.focus();
          return;
        }
        if (!content.value) {
          content.setAttribute('placeholder', "content를 확인해주세요")
          content.focus();
          return;
        }
        if (!writer.value) {
          writer.setAttribute('placeholder', "Writer를 확인해주세요")
          writer.focus();
          return;
        }
        document.querySelector("form").submit();
      }
    </script>
  </th:block>
</th:block>
</html>
