<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!-- ~{} 템플릿이나 조각을 지정하는 문법 -->
<th:block th:replace="~{layout/basic::setContent(~{this::content})}">
  <th:blcok th:fragment="content">
    <h1 class="mt-4">Guestbook List page</h1>
    <form th:action="@{/guestbook/list}" method="get" id="frmSrch" style="margin-bottom: 10px">
      <div class="input-group">
        <div class="input-group-prepend" style="margin-right: 10px;">
          <select name="type" id="type" class="form-control">
            <option value="">전체보기</option>
            <option value="t">제목</option>
            <option value="c">내용</option>
            <option value="w">작성자</option>
            <option value="tc">제목+내용</option>
            <option value="tcw">제목+내용+작성자</option>
          </select>
        </div>
        <input type="text" name="keyword" id="keyword" class="form-control" style="border-radius: 5px">
        <div class="input-group-append" style="margin-left: 10px">
          <button type="submit" class="btn-outline-primary btnSrch" >검색</button>
        </div>
      </div>
    </form>
    <table class="table table-striped">
      <tr>
        <th>Gno</th>
        <th>Title</th>
        <th>Writer</th>
        <th>Register Date</th>
        <th>Modified Date</th>
      </tr>
    </table>
  </th:blcok>
</th:block>
</html>
